# OpenSage config using OpenRouter free providers
# No API key needed - OpenRouter free tier

MAIN_MODEL = "openrouter/minimax/minimax-m2.5:free"
TASK_NAME = "opencode_free_memory"

[llm.model_configs.main]
model_name = "${MAIN_MODEL}"
temperature = 0.7
max_tokens = 4096

[llm.model_configs.summarize]
model_name = "openrouter/nvidia/nemotron-3-nano-30b-a3b:free"
temperature = 0.3
max_tokens = 2048

[llm.model_configs.flag_claims]
model_name = "openrouter/arcee-ai/trinity-mini:free"
temperature = 0.1
max_tokens = 1024

[agent_ensemble]
available_models_for_ensemble = [
    "openrouter/minimax/minimax-m2.5:free",
    "openrouter/nvidia/nemotron-3-super-120b-a12b:free",
    "openrouter/qwen/qwen3-next-80b-a3b-instruct:free"
]

[neo4j]
user = "neo4j"
password = "callgraphn4j!"
bolt_port = 7687
neo4j_http_port = 7474
