# OpenSage config using MiniMax (working in HK region)

MAIN_MODEL = "minimax/minimax-m2.5:free"
TASK_NAME = "minimax_test"

[llm.model_configs.main]
model_name = "${MAIN_MODEL}"
temperature = 0.7
max_tokens = 4096

[llm.model_configs.summarize]
model_name = "minimax/minimax-m2.5:free"
temperature = 0.3
max_tokens = 2048

[llm.model_configs.flag_claims]
model_name = "minimax/minimax-m2.5:free"
temperature = 0.1
max_tokens = 1024

[neo4j]
user = "neo4j"
password = "callgraphn4j!"
bolt_port = 7687
neo4j_http_port = 7474
