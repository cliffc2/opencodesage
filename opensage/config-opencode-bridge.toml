# OpenSage config using OpenCode LLM Bridge

MAIN_MODEL = "openai/http://127.0.0.1:5556/v1"
TASK_NAME = "opencode_bridge"

[llm.model_configs.main]
model_name = "opencode/mimo-v2-pro-free"
temperature = 0.7
max_tokens = 4096

[llm.model_configs.summarize]
model_name = "opencode/minimax-m2.5-free"
temperature = 0.3
max_tokens = 2048

[llm.model_configs.flag_claims]
model_name = "opencode/gpt-5-nano"
temperature = 0.1
max_tokens = 1024

[neo4j]
user = "neo4j"
password = "callgraphn4j!"
bolt_port = 7687
neo4j_http_port = 7474
